name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: gitsigner
          target: ${{ matrix.target }}
          checksum: sha256

  sign-release:
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload signature bundles to the release
      id-token: write # OIDC token for keyless signing via Fulcio
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v3
        with:
          cosign-release: 'v2.4.1'

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release-assets
          cd release-assets
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --pattern '*.tar.gz' --pattern '*.zip'
          ls -la

      - name: Sign artifacts (keyless via Fulcio)
        env:
          COSIGN_YES: "true"
        run: |
          cd release-assets
          shopt -s nullglob
          for f in *.tar.gz *.zip; do
            cosign sign-blob --bundle "${f}.cosign.bundle" "$f"
          done

      - name: Upload signatures to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cd release-assets
          shopt -s nullglob
          bundles=( *.cosign.bundle )
          if (( ${#bundles[@]} > 0 )); then
            gh release upload "$TAG" "${bundles[@]}" \
              --repo "${{ github.repository }}" --clobber
          fi
